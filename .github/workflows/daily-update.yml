name: Daily Tournament Update
# Fits model daily during tournament, exports dashboard JSON to site repo

on:
  schedule:
    # 1:00 PM UTC (9:00 AM ET) — ESPN scores fully settled
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check tournament window
        id: check-window
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" < "2026-03-17" || "$TODAY" > "2026-04-08" ]]; then
            echo "Outside tournament window ($TODAY). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tournament active ($TODAY)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout march_madness
        if: steps.check-window.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check-window.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        if: steps.check-window.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        if: steps.check-window.outputs.skip != 'true'
        run: uv sync

      - name: Clone site repo for existing snapshots
        if: steps.check-window.outputs.skip != 'true'
        env:
          SITE_REPO_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${SITE_REPO_TOKEN}@github.com/tjburch/tjburch.github.io.git site_repo
          # Copy existing snapshots into working directory so odds_timeline accumulates
          for GENDER in mens womens; do
            SRC="site_repo/assets/data/march-madness-2026/${GENDER}/snapshots"
            DEST="site_data/${GENDER}/snapshots"
            mkdir -p "${DEST}"
            if [ -d "${SRC}" ]; then
              cp "${SRC}"/*.json "${DEST}/" 2>/dev/null || true
            fi
          done

      - name: Fit model and export snapshots
        if: steps.check-window.outputs.skip != 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          uv run python -c "
          import gc, numpy as np
          from pathlib import Path
          from src.data import build_model_data
          from src.model import build_offense_defense_model, fit_model, get_team_strengths
          from src.simulate import build_bracket_structure, simulate_tournament
          from src.export import export_snapshot, export_odds_timeline

          SITE_DATA = Path('site_data')
          TODAY = '${TODAY}'

          for gender in ['M', 'W']:
              suffix = 'mens' if gender == 'M' else 'womens'
              gender_dir = SITE_DATA / suffix
              print(f'Processing {suffix}...')

              data = build_model_data(2026, gender)
              model = build_offense_defense_model(data)
              idata = fit_model(model, draws=1000, tune=1000, chains=2)

              strengths = get_team_strengths(idata, data)
              sigma = idata.posterior['sigma'].values.flatten()
              alpha = idata.posterior['alpha'].values.flatten()

              bracket = build_bracket_structure(2026, gender)
              sim = simulate_tournament(
                  bracket, sigma_samples=sigma,
                  team_ids=data['team_ids'], n_sims=10000, seed=42,
                  off_samples=strengths['off_samples'],
                  def_samples=strengths['def_samples'],
                  alpha_samples=alpha if gender == 'W' else None,
              )

              export_snapshot(
                  data=data,
                  sigma_samples=sigma,
                  sim_results=sim,
                  bracket_struct=bracket,
                  date=TODAY,
                  output_dir=gender_dir,
                  alpha_samples=alpha,
                  idata=idata,
                  off_samples=strengths['off_samples'],
                  def_samples=strengths['def_samples'],
              )

              export_odds_timeline(
                  gender_dir / 'snapshots',
                  gender_dir / 'odds_timeline.json',
              )

              del idata, strengths, sigma, alpha, sim
              gc.collect()
              print(f'  {suffix} complete.')

          print('Done.')
          "

      - name: Push to site repo
        if: steps.check-window.outputs.skip != 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          # Copy new data to site repo
          for GENDER in mens womens; do
            DEST="site_repo/assets/data/march-madness-2026/${GENDER}"
            mkdir -p "${DEST}/snapshots"
            cp "site_data/${GENDER}/snapshots/${TODAY}.json" "${DEST}/snapshots/"
            cp "site_data/${GENDER}/latest.json" "${DEST}/"
            cp "site_data/${GENDER}/odds_timeline.json" "${DEST}/"
          done

          cd site_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/march-madness-2026/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update March Madness dashboard data for ${TODAY}"
            git push
          fi
